<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Vastu</title>

<!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {margin:0; font-family:Arial; background:#f5f5f5;}
header {background:#111; color:#fff; text-align:center; padding:15px;}
.nav {display:flex; justify-content:center; gap:10px; margin-top:10px;}
.nav button {background:#fff; color:#111; padding:8px; border:none; border-radius:5px;}
.slider img {width:100%; height:220px; object-fit:cover;}
.container {padding:15px;}
.card {background:#fff; padding:10px; margin:10px 0; border-radius:10px;}
.gallery img {width:100%; margin-top:5px; border-radius:8px;}
input, textarea {width:100%; padding:10px; margin:5px 0;}
button {padding:10px; background:#111; color:#fff; border:none; border-radius:5px;}
.hidden {display:none;}
.whatsapp {position:fixed; bottom:20px; right:20px; background:green; color:#fff; padding:15px; border-radius:50%; font-size:20px; text-decoration:none;}
</style>
</head>

<body>

<header>
<h2>Shubh Vastu</h2>
<p>Dipak Waman Bachhav | 7020253407 |shubhvastubrokerage@gmail.com </p>

<div class="nav">
<button onclick="showPage('buyer')">Buyer</button>
<button onclick="showPage('seller')">Seller</button>
<button onclick="adminLogin()">Admin</button>
</div>
</header>

<div class="slider">
<img id="slide">
</div>

<div class="container">

<div id="buyerPage">
<h3>Buy Property</h3>
<div id="list"></div>
</div>

<div id="sellerPage" class="hidden">
<h3>Sell Property</h3>

<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">
<textarea id="desc" placeholder="Description"></textarea>

<input id="sellerName" placeholder="Seller Name">
<input id="sellerNumber" placeholder="Seller Number">

<input type="file" id="images" multiple>

<button onclick="addProperty()">Submit</button>
</div>

<div id="adminPanel" class="hidden">
<h3>Admin Panel</h3>
<div id="adminList"></div>
</div>

</div>

<a class="whatsapp" href="https://wa.me/917020253407">💬</a>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA7dGHSLSmRyDNxvGb8uQ7O28UcmZ-w0xg",
  authDomain: "shubh-vastu-brokerage.firebaseapp.com",
  projectId: "shubh-vastu-brokerage",
  storageBucket: "shubh-vastu-brokerage.firebasestorage.app",
  messagingSenderId: "120954846627",
  appId: "1:120954846627:web:c78450fabefd6560e1ee16"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

function showPage(p){
buyerPage.classList.add("hidden");
sellerPage.classList.add("hidden");
if(p==="buyer") buyerPage.classList.remove("hidden");
if(p==="seller") sellerPage.classList.remove("hidden");
}

let imgs = [
"https://images.unsplash.com/photo-1568605114967-8130f3a36994",
"https://images.unsplash.com/photo-1600585154340-be6161a56a0c",
"https://images.unsplash.com/photo-1570129477492-45c003edd2be"
];

let i=0;
setInterval(()=>{
slide.src = imgs[i];
i=(i+1)%imgs.length;
},2000);

async function addProperty(){
try {
let files = document.getElementById("images").files;
if(files.length === 0){
alert("Please select at least 1 image");
return;
}
let urls=[];
for(let file of files){
let storageRef = storage.ref().child("images/" + Date.now() + "_" + file.name);
await storageRef.put(file);
let downloadURL = await storageRef.getDownloadURL();
urls.push(downloadURL);
}
await db.collection("properties").add({
title: title.value,
price: price.value,
location: location.value,
desc: desc.value,
sellerName: sellerName.value,
sellerNumber: sellerNumber.value,
images: urls
});
alert("Property Added");
title.value=""; price.value=""; location.value=""; desc.value="";
sellerName.value=""; sellerNumber.value=""; images.value="";
} catch(error){
console.error(error);
alert("Error: " + error.message);
}
}

db.collection("properties").onSnapshot(snapshot=>{
let html=""; let adminHTML="";
snapshot.forEach(doc=>{
let p = doc.data();
html += `
<div class="card">
<h4>${p.title}</h4>
<p>${p.price}</p>
<p>${p.location}</p>
<p>${p.desc}</p>
<div class="gallery">
${p.images.map(img=>`<img src="${img}">`).join("")}
</div>
<a href="https://wa.me/917020253407">Contact on WhatsApp</a>
</div>`;
adminHTML += `
<div class="card">
<h4>${p.title}</h4>
<p>${p.sellerName}</p>
<p>${p.sellerNumber}</p>
<button onclick="deleteProperty('${doc.id}')">Delete</button>
</div>`;
});
list.innerHTML = html;
adminList.innerHTML = adminHTML;
});

function deleteProperty(id){
db.collection("properties").doc(id).delete();
}

function adminLogin(){
let pass = prompt("Password");
if(pass==="shiv7833"){
adminPanel.classList.remove("hidden");
}else{
alert("Wrong Password");
}
}

</script>

</body>
</html>
