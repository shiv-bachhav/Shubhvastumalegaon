<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Vastu</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {margin:0; font-family:Arial; background:#f5f5f5;}
header {background:#111; color:#fff; padding:15px; text-align:center;}
.container {padding:20px;}
.card {background:#fff; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
input, textarea, select {width:100%; padding:10px; margin:5px 0;}
button {padding:10px; background:#111; color:#fff; border:none; border-radius:5px; cursor:pointer; margin-top:5px;}
.gallery {display:flex; overflow:hidden;}
.gallery img {width:100%; height:200px; object-fit:cover;}
.property-img {width:100%; border-radius:10px; margin-top:10px;}
.loader {display:none; text-align:center; font-size:18px;}
.admin-panel {display:none; background:#222; color:#fff; padding:10px; margin-bottom:10px;}
</style>
</head>
<body>

<header>
<h1>Shubh Vastu</h1>
</header>

<div class="container">

<div class="admin-panel" id="adminPanel">
<h3>Admin Dashboard</h3>
<p>You can manage properties below</p>
</div>

<h2>Admin Login</h2>
<input id="adminPass" placeholder="Enter Admin Password">
<button onclick="adminLogin()">Login</button>

<h2>Image Slider</h2>
<div class="gallery">
<img id="slider" src="https://images.unsplash.com/photo-1560518883-ce09059eeffa">
</div>

<h2>Search</h2>
<input id="search" placeholder="Search by title or city" onkeyup="displayProperties()">

<h2>Sell Property</h2>
<input id="title" placeholder="Property Title">

<select id="type">
<option value="sale">For Sale</option>
<option value="rent">For Rent</option>
</select>

<input id="city" placeholder="City">
<input id="location" placeholder="Full Location">
<input id="price" placeholder="Price">
<input id="area" placeholder="Area (sq ft)">

<textarea id="desc" placeholder="Description"></textarea>

<input id="sellerName" placeholder="Seller Name">
<input id="sellerPhone" placeholder="Seller Phone">

<input type="file" id="images" multiple>

<button onclick="addProperty()">Upload Property</button>

<div class="loader" id="loader">Uploading...</div>

<h2>Buy Property</h2>
<div id="propertyList"></div>

</div>

<script>
const supabaseClient = supabase.createClient(
"https://ftpabprrqlfkofzdtbdw.supabase.co",
eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0cGFicHJycWxma29memR0YmR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjA5NTEsImV4cCI6MjA4OTU5Njk1MX0.il7QniFOhNUTfkJ3l7DEJ_iuYNjO4C7wKxzO1I8qAI0
);

let isAdmin = false;

function adminLogin() {
let pass = document.getElementById('adminPass').value;
if(pass === "shiv7833") {
isAdmin = true;
document.getElementById('adminPanel').style.display = 'block';
alert("Admin Login Success");
displayProperties();
} else {
alert("Wrong Password");
}
}

// Slider
let images = [
"https://images.unsplash.com/photo-1560518883-ce09059eeffa",
"https://images.unsplash.com/photo-1572120360610-d971b9d7767c",
"https://images.unsplash.com/photo-1502672260266-1c1ef2d93688"
];
let index = 0;
setInterval(()=>{
index = (index+1)%images.length;
document.getElementById('slider').src = images[index];
},3000);

async function addProperty() {
document.getElementById('loader').style.display='block';

let title = document.getElementById('title').value;
let type = document.getElementById('type').value;
let city = document.getElementById('city').value;
let location = document.getElementById('location').value;
let price = document.getElementById('price').value;
let area = document.getElementById('area').value;
let desc = document.getElementById('desc').value;
let sellerName = document.getElementById('sellerName').value;
let sellerPhone = document.getElementById('sellerPhone').value;
let files = document.getElementById('images').files;

let imageUrls = [];

for (let file of files) {
let fileName = Date.now() + file.name;

let { error } = await supabaseClient.storage
.from('property-images')
.upload(fileName, file);

if (error) {
alert("Image upload error: " + error.message);
}

let { data } = supabaseClient.storage
.from('property-images')
.getPublicUrl(fileName);

imageUrls.push(data.publicUrl);
}

let { error: insertError } = await supabaseClient.from('properties').insert([
{ title, type, city, location, price, area, desc, sellerName, sellerPhone, images: imageUrls }
]);

if(insertError){
alert("Database error: " + insertError.message);
}


document.getElementById('loader').style.display='none';
alert("Uploaded Successfully");
displayProperties();
}

async function displayProperties() {
let search = document.getElementById('search').value.toLowerCase();
let { data } = await supabaseClient.from('properties').select('*');

let list = document.getElementById('propertyList');
list.innerHTML = '';

(data || []).forEach(p => {
if(p.title.toLowerCase().includes(search) || (p.city && p.city.toLowerCase().includes(search))) {
let div = document.createElement('div');
div.className='card';

let adminInfo = isAdmin ? `<p><b>${p.sellerName} - ${p.sellerPhone}</b></p>` : '';
let adminBtns = isAdmin ? `<button onclick="deleteProperty(${p.id})">Delete</button>` : '';

let whatsapp = `<a href="https://wa.me/917020253407"><button>WhatsApp</button></a>`;


div.innerHTML = `
<h3>${p.title}</h3>
<p>Type: ${p.type} | City: ${p.city}</p>
<p>Location: ${p.location}</p>
<p>Price: ${p.price} | Area: ${p.area}</p>
<p>${p.desc}</p>
${adminInfo}
${(p.images||[]).map(i=>`<img src="${i}" class="property-img">`).join('')}
${whatsapp}
${adminBtns}
`;

list.appendChild(div);
}
});
}

async function deleteProperty(id) {
await supabaseClient.from('properties').delete().eq('id', id);
displayProperties();
}

displayProperties();
</script>

</body>
</html>
