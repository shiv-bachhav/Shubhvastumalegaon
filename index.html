<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Vastu</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {margin:0; font-family:Arial; background:#f5f5f5;}
header {background:#111; color:#fff; text-align:center; padding:15px;}
.nav {display:flex; justify-content:center; gap:10px; margin-top:10px;}
.nav button {background:#fff; color:#111; padding:8px 12px; border-radius:5px; border:none;}
.slider img {width:100%; height:220px; object-fit:cover;}
.container {padding:15px;}
.card {background:#fff; padding:12px; margin:10px 0; border-radius:10px;}
.gallery img {width:100%; margin-top:5px; border-radius:8px;}
button {padding:10px; background:#111; color:#fff; border:none; border-radius:5px;}
input, textarea {width:100%; padding:10px; margin:5px 0;}
.hidden {display:none;}
.whatsapp {position:fixed; bottom:20px; right:20px;}
.whatsapp img {width:55px;}
</style>
</head>

<body>

<header>
<h2>Shubh Vastu</h2>
<p>Dipak Waman Bachhav | 7020253407</p>

<div class="nav">
<button onclick="showPage('buyer')">Buyer</button>
<button onclick="showPage('seller')">Seller</button>
<button onclick="adminLogin()">Admin</button>
</div>
</header>

<div class="slider">
<img id="slide">
</div>

<div class="container">

<div id="buyerPage">
<h3>Buy Property</h3>
<div id="properties"></div>
</div>

<div id="sellerPage" class="hidden">
<h3>Sell Property</h3>
<input id="title" placeholder="Property Title">
<input id="price" placeholder="Price">
<input id="location" placeholder="Location">
<textarea id="desc" placeholder="Description"></textarea>

<input id="sellerName" placeholder="Seller Name">
<input id="sellerNumber" placeholder="Seller Phone Number">

<input type="file" id="imageFile">

<button onclick="addProperty()">Submit Property</button>
</div>

<div id="adminPanel" class="hidden">
<h3>Admin Panel</h3>
<div id="adminList"></div>
</div>

</div>

<!-- WhatsApp Icon -->
<a class="whatsapp" href="https://wa.me/917020253407" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>
// 🔑 SUPABASE
const supabaseUrl = "https://ftpabprrqlfkofzdtbdw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0cGFicHJycWxma29memR0YmR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjA5NTEsImV4cCI6MjA4OTU5Njk1MX0.il7QniFOhNUTfkJ3l7DEJ_iuYNjO4C7wKxzO1I8qAI0";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// PAGE SWITCH FIX
function showPage(page){
const buyerPage = document.getElementById("buyerPage");
const sellerPage = document.getElementById("sellerPage");

buyerPage.classList.add("hidden");
sellerPage.classList.add("hidden");

if(page==="buyer") buyerPage.classList.remove("hidden");
if(page==="seller") sellerPage.classList.remove("hidden");
}

// SLIDER FIX
let sliderImgs = [
"https://images.unsplash.com/photo-1568605114967-8130f3a36994",
"https://images.unsplash.com/photo-1600585154340-be6161a56a0c",
"https://images.unsplash.com/photo-1570129477492-45c003edd2be"
];

let i=0;
setInterval(()=>{
const slide = document.getElementById("slide");
slide.src = sliderImgs[i];
i=(i+1)%sliderImgs.length;
},2000);

// ADD PROPERTY (UPLOAD IMAGE + SAVE)
async function addProperty(){

let file = document.getElementById("imageFile").files[0];

if(!file){
alert("Select image");
return;
}

let fileName = Date.now() + "-" + file.name;

// upload image
let { error: uploadError } = await supabaseClient.storage
.from("images")
.upload(fileName, file);

if(uploadError){
alert("Image upload failed");
console.log(uploadError);
return;
}

// image URL
let imageUrl = `https://ftpabprrqlfkofzdtbdw.supabase.co/storage/v1/object/public/images/${fileName}`;

// save data
let { error } = await supabaseClient
.from("properties")
.insert([{
title: title.value,
price: price.value,
location: location.value,
desc: desc.value,
sellerName: sellerName.value,
sellerNumber: sellerNumber.value,
images: imageUrl
}]);

if(error){
alert("Error saving");
console.log(error);
}else{
alert("Property Added!");
loadProperties();
}
}

// LOAD DATA
async function loadProperties(){

let { data } = await supabaseClient
.from("properties")
.select("*")
.order("created_at", { ascending: false });

let html="";
let adminHTML="";

if(data.length === 0){
properties.innerHTML = "<p>No properties yet</p>";
return;
}

data.forEach(p=>{
html+=`
<div class="card">
<h4>${p.title}</h4>
<p>${p.price}</p>
<p>${p.location}</p>
<p>${p.desc}</p>
<div class="gallery">
<img src="${p.images}">
</div>
<button onclick="contact()">Contact Broker</button>
</div>`;

adminHTML+=`
<div class="card">
<h4>${p.title}</h4>
<p>Seller: ${p.sellerName}</p>
<p>Phone: ${p.sellerNumber}</p>
<button onclick="deleteProp('${p.id}')">Delete</button>
</div>`;
});

properties.innerHTML = html;
adminList.innerHTML = adminHTML;
}

// DELETE
async function deleteProp(id){
await supabaseClient.from("properties").delete().eq("id", id);
loadProperties();
}

// CONTACT
function contact(){
alert("Call Broker: 7020253407");
}

// ADMIN
function adminLogin(){
let pass = prompt("Enter Admin Password");
if(pass==="shiv7833"){
document.getElementById("adminPanel").classList.remove("hidden");
}else{
alert("Wrong Password");
}
}

loadProperties();

</script>

</body>
</html>
